<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetic Retinopathy Detection</title>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #eef2f3, #dfe9f3);
    margin: 0;
    text-align: center;
}
header {
    background: #1e2a38;
    color: white;
    padding: 20px;
}
.container {
    margin: 30px auto;
    width: 90%;
    max-width: 700px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
button {
    padding: 10px 20px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}
button:hover {
    background: #0056b3;
}
img {
    margin-top: 15px;
    max-width: 100%;
    border-radius: 10px;
}
.result-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
}
.success { background: #d4edda; }
.warning { background: #fff3cd; }
.danger { background: #f8d7da; }

canvas {
    margin-top: 20px;
}
footer {
    margin-top: 20px;
    padding: 10px;
    background: #ccc;
}
</style>
</head>

<body>

<header>
<h1>Diabetic Retinopathy Detection</h1>
<p>AI-Based Eye Disease Analysis</p>
</header>

<div class="container">

<h3>Upload Fundus Image</h3>
<input type="file" id="imageInput" accept="image/*">
<br>
<button onclick="predict()">Analyze</button>

<img id="preview"/>

<div id="result"></div>

<!-- 📊 Charts -->
<canvas id="confidenceChart"></canvas>
<canvas id="probChart"></canvas>

</div>

<footer>
<p>© 2026 Sushanth | ML Healthcare Project</p>
</footer>

<script>
const classes = ["No_DR", "Mild", "Moderate", "Severe", "Proliferative_DR"];
let probChart, confidenceChart;

function predict() {
    const file = document.getElementById("imageInput").files[0];
    const preview = document.getElementById("preview");
    const resultDiv = document.getElementById("result");

    if (!file) {
        resultDiv.innerHTML = "Please upload an image.";
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        preview.src = e.target.result;
    };
    reader.readAsDataURL(file);

    // 🔥 Simulated prediction
    let probs = [];
    let sum = 0;

    for (let i = 0; i < 5; i++) {
        let val = Math.random();
        probs.push(val);
        sum += val;
    }

    probs = probs.map(p => p / sum);

    let maxIndex = probs.indexOf(Math.max(...probs));
    let resultClass = classes[maxIndex];
    let confidence = (probs[maxIndex] * 100).toFixed(2);

    let message = "";
    let style = "success";

    if (maxIndex == 0) {
        message = "No Diabetic Retinopathy detected.";
        style = "success";
    } else if (maxIndex == 1) {
        message = "Mild DR - Regular monitoring recommended.";
        style = "warning";
    } else if (maxIndex == 2) {
        message = "Moderate DR - Consult doctor.";
        style = "warning";
    } else if (maxIndex == 3) {
        message = "Severe DR - Immediate attention required.";
        style = "danger";
    } else {
        message = "Proliferative DR - Urgent medical care needed.";
        style = "danger";
    }

    resultDiv.innerHTML = `
    <div class="result-box ${style}">
        <h3>Analysis Complete</h3>
        <p><b>Class:</b> ${resultClass}</p>
        <p><b>Confidence:</b> ${confidence}%</p>
        <p><b>Diagnosis:</b> ${message}</p>
    </div>
    `;

    // Destroy old charts
    if (probChart) probChart.destroy();
    if (confidenceChart) confidenceChart.destroy();

    // 📊 Bar Chart
    probChart = new Chart(document.getElementById("probChart"), {
        type: 'bar',
        data: {
            labels: classes,
            datasets: [{
                label: 'Probability (%)',
                data: probs.map(p => (p * 100).toFixed(2))
            }]
        }
    });

    // 🍩 Doughnut Chart
    confidenceChart = new Chart(document.getElementById("confidenceChart"), {
        type: 'doughnut',
        data: {
            labels: ["Confidence", "Remaining"],
            datasets: [{
                data: [confidence, 100 - confidence]
            }]
        }
    });
}
</script>

</body>
</html>
